name: Agentic Follow-up Cron Engine (DB Polling)

on:
  schedule:
    # UTC 时间。每天 00:00-14:00（北京时间 08:00-22:00）每小时执行一次
    - cron: '0 0-14 * * *'
  workflow_dispatch:  # 支持在 GitHub 网页手动触发测试

# 避免上一轮还没跑完就被下一轮重叠触发
concurrency:
  group: agent-cron
  cancel-in-progress: false

jobs:
  poll-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -e packages/aol    # aol 包（含 pymongo / libsql-client / openai 等依赖）

      - name: Execute Incremental Agent
        env:
          # 安全默认：DRY_RUN=true（企微仅预览不打扰），切真发需显式设 vars.DRY_RUN=false
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          # 事件源（默认 dev 库 xlinkdemo，切生产需显式设 vars.FSM_MONGO_DB=xlink）
          FSM_SOURCE: ${{ vars.FSM_SOURCE || 'mongo' }}
          FSM_MONGO_URL: ${{ secrets.FSM_MONGO_URL }}
          FSM_MONGO_DB: ${{ vars.FSM_MONGO_DB || 'xlinkdemo' }}
          FSM_TIME_FIELD: ${{ vars.FSM_TIME_FIELD || 'updateTime' }}
          # v0.2 楔子：待签约停滞（206），仅最近 14 天
          FSM_EVENT_STATUSES: ${{ vars.FSM_EVENT_STATUSES || '206' }}
          FSM_MAX_AGE_DAYS: ${{ vars.FSM_MAX_AGE_DAYS || '14' }}
          FSM_STALE_DAYS: ${{ vars.FSM_STALE_DAYS || '0' }}
          FSM_BATCH_LIMIT: ${{ vars.FSM_BATCH_LIMIT || '50' }}
          FSM_PILOT_HOUSEKEEPERS: ${{ vars.FSM_PILOT_HOUSEKEEPERS }}
          FSM_PILOT_HOUSEKEEPER_IDS: ${{ vars.FSM_PILOT_HOUSEKEEPER_IDS }}
          # 展示轨：enrich 只读查证 + LLM
          AGENT_MODE: ${{ vars.AGENT_MODE || 'steps' }}
          # 追踪库（云端 Turso，aol_ 表名前缀与 Console 共享）
          TRACKING_SOURCE: ${{ vars.TRACKING_SOURCE || 'cloud' }}
          AOL_TABLE_PREFIX: ${{ vars.AOL_TABLE_PREFIX || 'aol_' }}
          # 复用 sales-reward-hub / stockwise 同名 Turso secrets，映射到引擎 env
          TURSO_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          # LLM：默认混元 Lite（日常）
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'hunyuan' }}
          HUNYUAN_API_KEY: ${{ secrets.HUNYUAN_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'hunyuan-lite' }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          WECOM_WEBHOOK_MAP: ${{ vars.WECOM_WEBHOOK_MAP }}
        run: |
          python run_cron.py
