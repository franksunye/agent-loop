[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aol"
version = "0.2.0"
description = "FS-AOL follow-up engine (poc-followup): layered field-service agent operating layer."
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.1",
    "requests>=2.31.0",
    "pydantic>=2.6.0",
    "openai>=1.30.0",
    "pymongo>=4.6.0",          # FSM_SOURCE=mongo (XLink 主路径)
    "libsql-client>=0.3.1",   # TRACKING_SOURCE=cloud (Turso)
]

[project.scripts]
aol-cron = "aol.app:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["aol*"]
